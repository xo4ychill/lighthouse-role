# =============================================================================
# handlers/main.yml
# =============================================================================
# Все хендлеры определены внутри ролей для лучшей инкапсуляции.
# Этот файл можно использовать для кросс-ролевых хендлеров.
---
- name: reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded                # Graceful reload без потери соединений
