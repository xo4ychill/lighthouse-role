---
# ============================================================
# Установка пакетов
# ============================================================

- name: Install packages
  ansible.builtin.package:
    name:
      - nginx
      - git
    state: present
    update_cache: true

# ============================================================
# Клонирование Lighthouse
# ============================================================

- name: Clone Lighthouse repository
  ansible.builtin.git:
    repo: "{{ lighthouse_repo }}"
    dest: "{{ lighthouse_dir }}"
    version: master

# ============================================================
# Конфиг Lighthouse
# ============================================================

- name: Deploy config.js
  ansible.builtin.template:
    src: config.js.j2
    dest: "{{ lighthouse_dir }}/config.js"
    mode: "0644"

# ============================================================
# Конфиг Nginx
# ============================================================

- name: Deploy Nginx config
  ansible.builtin.template:
    src: lighthouse.conf.j2
    dest: /etc/nginx/sites-available/lighthouse.conf
    mode: "0644"
  notify: reload nginx

- name: Enable Lighthouse site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/lighthouse.conf
    dest: /etc/nginx/sites-enabled/lighthouse.conf
    state: link

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

# ============================================================
# Проверка конфигурации Nginx
# ============================================================

- name: Validate nginx config
  ansible.builtin.command: nginx -t
  changed_when: false

# ============================================================
# Запуск Nginx
# ============================================================

- name: Enable and start nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
