---
# 📦 Установка пакетов
- name: 📦 Install required packages
  ansible.builtin.package:
    name: "{{ lighthouse_packages }}"
    state: present
    update_cache: true
  tags: [packages]

# 🗄️ Клонирование репозитория
- name: 🗄️ Clone Lighthouse repository
  ansible.builtin.git:
    repo: "{{ lighthouse_repo }}"
    dest: "{{ lighthouse_dir }}"
    version: "{{ lighthouse_version }}"
    update: true
    force: true
  notify: reload nginx
  register: _clone
  retries: 2
  delay: 5
  until: _clone is success
  tags: [git, deploy]

# ⚙️ Деплой config.js (Jinja2 template)
- name: ⚙️ Deploy Lighthouse config.js
  ansible.builtin.template:
    src: "config.js.j2"
    dest: "{{ lighthouse_dir }}/config.js"
    mode: "0644"
  notify: reload nginx
  tags: [config]

# 📁 Настройка Nginx
- name: 📁 Create nginx log directory
  ansible.builtin.file:
    path: "{{ lighthouse_nginx_log_dir }}"
    state: directory
    owner: www-data
    group: adm
    mode: "0755"
  tags: [nginx]

- name: ⚙️ Deploy Nginx configuration
  ansible.builtin.template:
    src: "lighthouse.nginx.j2"
    dest: "{{ lighthouse_dir }}/lighthouse.conf"
    mode: "0644"
  notify: reload nginx
  tags: [nginx, config]

- name: 🔗 Symlink to sites-enabled
  ansible.builtin.file:
    src: "{{ lighthouse_dir }}/lighthouse.conf"
    dest: /etc/nginx/sites-enabled/lighthouse.conf
    state: link
    force: true
  notify: reload nginx
  tags: [nginx]

- name: 🗑️ Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx
  tags: [nginx]

- name: 🔍 Validate Nginx configuration
  ansible.builtin.command: nginx -t
  register: _nginx_test
  changed_when: false
  failed_when: _nginx_test.rc != 0
  tags: [nginx, validate]

# ▶️ Запуск Nginx
- name: ▶️ Enable and start Nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
    daemon_reload: true
  tags: [nginx, service]
